services:
  # Container 1: Nginx
  nginx:
    image: nginx:alpine
    container_name: proxy_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - rede_app

  # Container 2: API REST
  api:
    build: ./api
    container_name: api_flask
    environment:
      - DB_HOST=banco
      - DB_USER=root
      - DB_PASSWORD=123
      - DB_NAME=app_db
    depends_on:
      - banco
    networks:
      - rede_app

  # Container 3: MySQL
  banco:
    image: mysql:8.0
    container_name: db_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=123
      - MYSQL_DATABASE=app_db
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - rede_app

networks:
  rede_app:
    driver: bridge

volumes:
  db_data: